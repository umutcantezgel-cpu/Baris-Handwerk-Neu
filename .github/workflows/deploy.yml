name: Production Build & Deploy

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build

      # In a real scenario, this would deploy to Vercel/AWS/Azure
      # For now, we simulate a deployment by uploading the build artifact
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v3
        with:
          name: production-build
          path: dist/
